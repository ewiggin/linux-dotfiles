# Prefix: Ctrl b (default)
# ─────────────────────────────────────────────

# Historial generoso
set -g history-limit 10000

# Índices desde 1 (más intuitivo con el teclado)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Tiempo de escape bajo (importante para nvim)
set -sg escape-time 10

# Colores
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse activado
set -g mouse on

# ── Paneles ────────────────────────────────────
# Split con | y - (más intuitivo que % y ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navegación vim-style entre paneles
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize vim-style (mayúsculas)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Fullscreen del panel actual
bind f resize-pane -Z

# ── Tabs (windows) ─────────────────────────────
# Nueva tab con el cwd actual
bind c new-window -c "#{pane_current_path}"

# Navegar tabs
bind n next-window
bind p previous-window

# Ir a tab por número
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5

# ── Sesiones ───────────────────────────────────
bind d detach

# ── Scroll / Copy mode ─────────────────────────
# Scroll con vim-style
setw -g mode-keys vi
bind s copy-mode
bind -T copy-mode-vi k send -X cursor-up
bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi h send -X cursor-left
bind -T copy-mode-vi l send -X cursor-right
bind -T copy-mode-vi u send -X halfpage-up
bind -T copy-mode-vi d send -X halfpage-down
bind -T copy-mode-vi f command-prompt -p "search:" "send -X search-forward '%%%'"

# ── Status bar ─────────────────────────────────
set -g status-position bottom
set -g status-style 'bg=#1e2030 fg=#c8d3f5'
set -g status-left '#[fg=#82aaff,bold] #S '
set -g status-right '#[fg=#636da6] %H:%M '
set -g window-status-format '#[fg=#636da6] #I #W '
set -g window-status-current-format '#[fg=#82aaff,bold] #I #W '
set -g status-left-length 20

# ── Título del panel ───────────────────────────
set -g pane-border-status top
set -g pane-border-format ' #{pane_current_path} '
set -g pane-active-border-style 'fg=#82aaff,bold'
set -g pane-border-style 'fg=#636da6'

# ── Plugins ────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Inicializar TPM (siempre al final del archivo)
run '~/.tmux/plugins/tpm/tpm'
